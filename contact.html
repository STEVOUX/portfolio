<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CONTACT | Steve Shine</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;600;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css">
  
  <!-- GSAP & Lenis -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://unpkg.com/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>
</head>
<body>

  <!-- Global Premium Background Layer -->
  <div class="global-bg">
    <div class="global-glow"></div>
    <div class="ambient-glow" id="ambient-glow"></div>
  </div>
  
  <!-- Noise Overlay -->
  <div class="noise-bg"></div>

  <!-- Page Transition Curtain -->
  <div class="page-transition"></div>

  <!-- Magnetic Cursor -->
  <div class="cursor-follower"></div>
  <div class="cursor-dot"></div>

  <!-- Header & Menu Toggle -->
  <header class="header">
    <a href="index.html" class="logo" data-interactive>STEVOUX</a>
    <button class="menu-toggle" data-interactive>
      <span></span>
      <span></span>
    </button>
  </header>

  <!-- Fullscreen Navigation -->
  <nav class="nav-overlay">
    <div class="nav-content">
      <ul class="nav-links">
        <li><a href="index.html" class="nav-link" data-interactive>Home</a></li>
        <li><a href="works.html" class="nav-link" data-interactive>Works</a></li>
        <li><a href="ventures.html" class="nav-link" data-interactive>Ventures</a></li>
        <li><a href="contact.html" class="nav-link" data-interactive>Contact</a></li>
      </ul>
      <div class="nav-footer">
        <a href="#" class="social-link" data-interactive>Twitter</a>
        <a href="#" class="social-link" data-interactive>LinkedIn</a>
        <a href="#" class="social-link" data-interactive>GitHub</a>
      </div>
    </div>
  </nav>

  <!-- Main Content Wrapper -->
  <main id="main-content">
    
    <section class="contact-page">
      <div class="container">
        <div class="contact-grid">
          
          <div class="contact-info">
            <h1 class="hero-title">LET'S<br><span>TALK</span></h1>
            <p class="section-desc">Whether you have a groundbreaking idea, need an enterprise solution, or just want to connect, I'm always open to discussing new projects.</p>
            
            <div class="contact-details">
              <div class="detail-item">
                <h3>EMAIL</h3>
                <a href="mailto:hello@stevoux.com" class="highlight-link" data-interactive>hello@stevoux.com</a>
              </div>
              <div class="detail-item">
                <h3>SOCIAL</h3>
                <div class="social-links" style="margin-top: 0.5rem;">
                  <a href="#" class="social-icon" data-interactive>TW</a>
                  <a href="#" class="social-icon" data-interactive>IN</a>
                  <a href="#" class="social-icon" data-interactive>GH</a>
                </div>
              </div>
            </div>
          </div>

          <div class="contact-form-container glass">
            <form class="contact-form">
              <div class="form-group">
                <input type="text" id="name" placeholder=" " required>
                <label for="name">What's your name?</label>
                <div class="input-line"></div>
              </div>
              <div class="form-group">
                <input type="email" id="email" placeholder=" " required>
                <label for="email">Your email address?</label>
                <div class="input-line"></div>
              </div>
              <div class="form-group">
                <textarea id="message" rows="4" placeholder=" " required></textarea>
                <label for="message">Tell me about your project...</label>
                <div class="input-line"></div>
              </div>
              <button type="submit" class="submit-btn" data-interactive>
                SEND MESSAGE
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <line x1="5" y1="12" x2="19" y2="12"></line>
                  <polyline points="12 5 19 12 12 19"></polyline>
                </svg>
              </button>
            </form>
          </div>

        </div>
      </div>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
